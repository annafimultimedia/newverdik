<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webiste Form Verdik Generator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-site: #f8fafc;
            --zebra: #fafafa; 
            --header-bg: #f1f5f9;
        }

        @page { size: A4 landscape; margin: 0.5cm; }
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-after: always; }
            body { background: white; padding: 0; }
            .container { max-width: 100%; margin: 0; padding: 0; }
            table { font-size: 7pt; width: 100%; border: 1px solid black; }
            .report-section { border: none; box-shadow: none; padding: 0; margin-bottom: 20px; }
            tr:nth-child(even) { background-color: #fafafa !important; -webkit-print-color-adjust: exact; }
            th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; }
            .footer-sign-container { break-inside: avoid; page-break-inside: avoid; margin-top: 10px; }
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-site);
            margin: 0; padding: 20px; color: #1e293b;
        }

        .container { max-width: 1400px; margin: auto; }

        .controls { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px; border: 1px solid #e2e8f0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 15px; text-align: left;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #64748b; }
        .form-group input { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; }

        #drop-zone {
            border: 2px dashed #cbd5e1; padding: 20px; border-radius: 10px;
            background: #ffffff; cursor: pointer; text-align: center;
        }
        #drop-zone.hover { border-color: var(--primary); background: #eff6ff; }

        .btn { padding: 8px 18px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; margin: 5px; }
        .btn-fill { background: var(--primary); color: white; }
        .btn-outline { background: #10b981; color: white; }

        .report-section { background: white; padding: 5px; margin-top: 10px; }
        .kop-surat { text-align: center; margin-bottom: 8px; line-height: 1.2; }
        .kop-surat h2 { margin: 0; font-size: 12pt; text-decoration: underline; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; word-wrap: break-word; }
        th, td { 
            border: 1px solid #000; 
            padding: 2px 4px; 
            font-size: 7.2pt; 
            color: black;
            line-height: 1.1; 
            vertical-align: middle;
            white-space: normal; 
            overflow: visible; 
        }
        th { background: var(--header-bg); font-weight: bold; }
        
        /* Penyesuaian Lebar Kolom agar NIK tidak terpotong */
        .col-no { width: 22px; }
        .col-nama { width: 110px; text-align: left; }
        .col-nik { width: 98px; letter-spacing: -0.2px; } /* Diperlebar dan huruf dirapatkan */
        .col-nisn { width: 75px; }
        .col-kelas { width: 40px; }
        .col-abs { width: 16px; }
        .col-paraf { width: 40px; }
        .col-pendamping { width: 90px; text-align: left; }

        tbody tr:nth-child(even) { background-color: #fafafa; }
        
        .footer-sign-container { 
            margin-top: 10px; display: flex; 
            justify-content: space-between; width: 100%;
        }
        .sign-box { width: 300px; text-align: center; font-size: 8.5pt; line-height: 1.2; }
        .spacer { height: 35px; } 
    </style>
</head>
<body>

<div class="container">
    <div class="controls no-print">
        <h3 style="margin-top:0; text-align: center;">Form Verdik Generator | Periode Oktober - Desember 2025</h3>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Nama Pendamping (Untuk TTD)</label>
                <input type="text" id="inputNamaPendamping" placeholder="Nama untuk tanda tangan">
            </div>
            <div class="form-group">
                <label>NIP Pendamping (Untuk TTD)</label>
                <input type="text" id="inputNipPendamping" placeholder="NIP untuk tanda tangan">
            </div>
            <div class="form-group">
                <label>Kabupaten / Kota</label>
                <input type="text" id="inputKota" placeholder="Contoh: Jember">
            </div>
        </div>

        <div id="drop-zone">
            <p id="status-text">Tarik file CSV ke sini atau klik Pilih File</p>
            <input type="file" id="fileInput" accept=".csv" multiple style="display: none;">
            <button class="btn btn-fill" onclick="document.getElementById('fileInput').click()">Pilih File</button>
            <button class="btn btn-outline" onclick="processFiles()">Generate Formulir</button>
            <button class="btn btn-fill" style="background:#dc2626" onclick="window.print()">Cetak PDF</button>
        </div>
    </div>
    <div id="outputArea"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');

    async function processFiles() {
        const outputArea = document.getElementById('outputArea');
        outputArea.innerHTML = '';
        const files = Array.from(fileInput.files);
        if (files.length === 0) return alert('Pilih file CSV terlebih dahulu!');

        for (const file of files) {
            const text = await file.text();
            if (files.length === 1) setDocumentTitle(text);
            else document.title = "Verdik Gabungan";
            parseAndRender(text);
        }
    }

    function setDocumentTitle(text) {
        let npsn = "000000", school = "Sekolah";
        text.split('\n').forEach(l => {
            const c = l.split(';');
            if (l.includes("NPSN")) npsn = c[1]?.replace(/['":;]/g, '').trim();
            if (l.includes("Nama Sekolah")) school = c[1]?.replace(/['":;]/g, '').trim();
        });
        document.title = `Verdik_${npsn}_${school}`;
    }

    function parseAndRender(content) {
        const lines = content.split('\n').map(l => l.split(';'));
        let npsn = "", sekolah = "", rawData = [];
        let csvPIdx = -1;

        lines.forEach((cols) => {
            const rowStr = cols.join(';');
            if (rowStr.includes("NPSN")) npsn = cols[1]?.replace(/['":;]/g, '').trim();
            if (rowStr.includes("Nama Sekolah")) sekolah = cols[1]?.replace(/['":;]/g, '').trim();
            if (rowStr.toUpperCase().includes("NAMA PENDAMPING")) {
                csvPIdx = cols.findIndex(c => c.toUpperCase().includes("NAMA PENDAMPING"));
            }
            if (!isNaN(parseInt(cols[0]))) rawData.push(cols);
        });

        rawData.sort((a, b) => {
            const kA = (a[7] || "").replace(/['"]/g, '').trim();
            const kB = (b[7] || "").replace(/['"]/g, '').trim();
            const nA = (a[5] || "").replace(/['"]/g, '').trim();
            const nB = (b[5] || "").replace(/['"]/g, '').trim();
            if (kA !== kB) return kA.localeCompare(kB, undefined, {numeric: true});
            return nA.localeCompare(nB);
        });

        if (rawData.length > 0) renderTable(sekolah, npsn, rawData, csvPIdx);
    }

    function renderTable(sekolah, npsn, data, csvPIdx) {
        const clean = (t) => t ? t.replace(/['"'';]/g, '').trim() : '';
        const ttdNama = document.getElementById('inputNamaPendamping').value || "__________________________";
        const ttdNip = document.getElementById('inputNipPendamping').value || "_____________________";
        const ttdKota = document.getElementById('inputKota').value || ".........";

        let html = `
            <div class="page-break report-section">
                <div class="kop-surat">
                    <h2>FORM VERIFIKASI KOMITMEN PENDIDIKAN</h2>
                    <div style="font-weight: bold; font-size: 11pt; margin-top: 3px;">${sekolah}</div>
                    <div style="font-size: 9pt;">NPSN: ${npsn}</div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th class="col-no" rowspan="3">NO</th>
                            <th class="col-nama" rowspan="3">NAMA PENGURUS</th>
                            <th class="col-nama" rowspan="3">NAMA SISWA</th>
                            <th class="col-nik" rowspan="3">NIK SISWA</th>
                            <th class="col-nisn" rowspan="3">NISN</th>
                            <th class="col-kelas" rowspan="3">KELAS</th>
                            <th colspan="5">OKTOBER</th>
                            <th colspan="5">NOVEMBER</th>
                            <th colspan="5">DESEMBER</th>
                            <th class="col-paraf" rowspan="3">PARAF</th>
                            <th class="col-pendamping" rowspan="3">NAMA PENDAMPING</th>
                        </tr>
                        <tr>
                            <th colspan="5">Efektif: __</th><th colspan="5">Efektif: __</th><th colspan="5">Efektif: __</th>
                        </tr>
                        <tr>
                            <th class="col-abs">A</th><th class="col-abs">I</th><th class="col-abs">S</th><th class="col-abs">Σ</th><th class="col-abs">%</th>
                            <th class="col-abs">A</th><th class="col-abs">I</th><th class="col-abs">S</th><th class="col-abs">Σ</th><th class="col-abs">%</th>
                            <th class="col-abs">A</th><th class="col-abs">I</th><th class="col-abs">S</th><th class="col-abs">Σ</th><th class="col-abs">%</th>
                        </tr>
                    </thead>
                    <tbody>`;

        data.forEach((row, i) => {
            const pendampingDariCSV = csvPIdx !== -1 ? clean(row[csvPIdx]) : "";
            html += `<tr>
                <td style="text-align:center">${i + 1}</td>
                <td class="col-nama">${clean(row[2])}</td>
                <td class="col-nama"><strong>${clean(row[5])}</strong></td>
                <td class="col-nik" style="text-align:center">${clean(row[3])}</td>
                <td style="text-align:center">${clean(row[4])}</td>
                <td style="text-align:center">${clean(row[7])}</td>
                <td></td><td></td><td></td><td></td><td></td>
                <td></td><td></td><td></td><td></td><td></td>
                <td></td><td></td><td></td><td></td><td></td>
                <td></td>
                <td class="col-pendamping">${pendampingDariCSV}</td>
            </tr>`;
        });

        html += `</tbody></table>
            <div class="footer-sign-container">
                <div class="sign-box">
                    <p>&nbsp;</p>
                    <p>Mengetahui,</p>
                    <p><strong>PENDAMPING PKH</strong></p>
                    <div class="spacer"></div>
                    <p>${ttdNama}</p>
                    <p>NIP. ${ttdNip}</p>
                </div>
                <div class="sign-box">
                    <p>${ttdKota}, .............................</p>
                    <p>Diketahui Oleh :</p>
                    <p><strong>KEPALA SEKOLAH / GURU</strong></p>
                    <div class="spacer"></div>
                    <p>__________________________</p>
                    <p>NIP. ...................................</p>
                </div>
            </div>
        </div>`;
        document.getElementById('outputArea').innerHTML += html;
    }

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('hover');
        fileInput.files = e.dataTransfer.files;
        document.getElementById('status-text').innerText = fileInput.files.length + " file terpilih";
    });
</script>
</body>
</html>
